{% extends "base.html" %}
{% block title %}Voter Registration{% endblock %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4 p-lg-5">
        <h2 class="fw-bold mb-4">Voter Registration</h2>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if info %}
            <div class="alert alert-info">{{ info }}</div>
        {% endif %}
        <div
            id="otpMeta"
            data-resend-wait="{{ resend_wait_seconds }}"
            data-expiry-seconds="{{ expiry_remaining_seconds }}">
        </div>
        <form method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control js-uppercase" name="full_name" value="{{ form_data.full_name if form_data else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" name="dob" value="{{ form_data.dob if form_data else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" required>
                    <option value="">Select</option>
                    <option value="Male" {% if form_data and form_data.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if form_data and form_data.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if form_data and form_data.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Father's Name</label>
                <input type="text" class="form-control js-uppercase" name="father_name" value="{{ form_data.father_name if form_data else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Aadhaar Number</label>
                <input type="text" class="form-control" name="aadhaar" value="{{ form_data.aadhaar if form_data else '' }}" maxlength="12" inputmode="numeric" pattern="\d{12}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Confirm Aadhaar</label>
                <input type="text" class="form-control" name="confirm_aadhaar" value="{{ form_data.confirm_aadhaar if form_data else '' }}" maxlength="12" inputmode="numeric" pattern="\d{12}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phone_number" value="{{ form_data.phone_number if form_data else '' }}" maxlength="10" inputmode="numeric" pattern="\d{10}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email (Optional)</label>
                <input type="email" class="form-control js-lowercase" name="email" value="{{ form_data.email if form_data else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Constituency</label>
                <input type="text" class="form-control js-uppercase" name="constituency" value="{{ form_data.constituency if form_data else '' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control js-uppercase" name="address" rows="3" required>{{ form_data.address if form_data else '' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control js-password-field" name="password" value="{{ form_data.password if form_data else '' }}" minlength="6" required>
                    <button class="btn btn-outline-secondary js-password-toggle" type="button">Show</button>
                </div>
                <div class="form-text">Password must be at least 6 characters long.</div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" class="form-control js-password-field" name="confirm_password" value="{{ form_data.confirm_password if form_data else '' }}" minlength="6" required>
                    <button class="btn btn-outline-secondary js-password-toggle" type="button">Show</button>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Verify OTP</label>
                <input type="text" class="form-control" name="otp" value="{{ form_data.otp if form_data else '' }}" maxlength="6" inputmode="numeric" pattern="\d{6}">
                <div class="form-text">Enter the 6-digit OTP sent to your phone.</div>
                <div class="small mt-2 text-muted" id="otpExpiryMessage"></div>
            </div>
            <div class="col-12 d-flex flex-wrap gap-2">
                <button type="submit" name="action" value="send_otp" class="btn btn-outline-primary btn-lg">Send OTP</button>
                <button type="submit" name="action" value="resend_otp" class="btn btn-outline-secondary btn-lg" id="resendOtpButton">Resend OTP</button>
                <button type="submit" name="action" value="register" class="btn btn-dark btn-lg">Register Voter</button>
            </div>
            <div class="col-12">
                <div class="small text-muted" id="resendOtpMessage"></div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
